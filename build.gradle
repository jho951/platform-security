ext {
    springFrameworkVersion = findProperty('springFrameworkVersion') ?: '6.2.17'
    springBootVersion = findProperty('springBootVersion') ?: '3.5.13'
    junitVersion = findProperty('junitVersion') ?: '5.10.3'
    authVersion = findProperty('authVersion') ?: '3.0.0'
    ipGuardVersion = findProperty('ipGuardVersion') ?: '3.0.0'
    rateLimiterVersion = findProperty('rateLimiterVersion') ?: '2.0.0'
}

allprojects {
    group = 'io.github.jho951.platform'
    version = findProperty('releaseVersion') ?: '0.1.0-SNAPSHOT'

    repositories {
        mavenCentral()
    }
}

subprojects {
    if (name != 'platform-security-bom') {
        apply plugin: 'java-library'

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(17)
            }
            withSourcesJar()
            withJavadocJar()
        }
    }

    if (name != 'platform-security-bom' && name != 'platform-security-sample-consumer') {
        apply plugin: 'maven-publish'
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }

    if (name != 'platform-security-bom' && name != 'platform-security-sample-consumer') {
        publishing {
            publications {
                mavenJava(MavenPublication) {
                    from components.java
                    artifactId = project.name
                    pom {
                        name = project.name
                        description = "platform-security module ${project.name}"
                        url = "https://github.com/jho951/platform-security"
                    }
                }
            }
            repositories {
                if (project.hasProperty('githubPackagesUrl')) {
                    maven {
                        name = 'GitHubPackages'
                        url = uri(project.property('githubPackagesUrl'))
                        credentials {
                            username = project.findProperty('githubPackagesUsername') ?: System.getenv('GITHUB_ACTOR')
                            password = project.findProperty('githubPackagesToken') ?: System.getenv('GITHUB_TOKEN')
                        }
                    }
                }
            }
        }
    }
}

project(':platform-security-core') {
    dependencies {
        api project(':platform-security-api')
        testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
        testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
    }
}
