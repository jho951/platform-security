ext {
    springFrameworkVersion = findProperty('springFrameworkVersion') ?: '6.2.17'
    springBootVersion = findProperty('springBootVersion') ?: '3.5.13'
    junitVersion = findProperty('junitVersion') ?: '5.10.3'
    authVersion = findProperty('authVersion') ?: '3.0.0'
    ipGuardVersion = findProperty('ipGuardVersion') ?: '3.0.0'
    rateLimiterVersion = findProperty('rateLimiterVersion') ?: '2.0.0'
}

allprojects {
    group = 'io.github.jho951.platform'
    version = findProperty('releaseVersion') ?: '0.1.0-SNAPSHOT'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java-library'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
        withSourcesJar()
        withJavadocJar()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }
}

project(':platform-security-core') {
    dependencies {
        api project(':platform-security-api')
        testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
        testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
    }
}

project(':platform-security-spring') {
    dependencies {
        api project(':platform-security-api')
        api project(':platform-security-core')
        api project(':platform-security-web')
        api project(':platform-security-auth-adapter')

        implementation "io.github.jho951:ip-guard-core:${ipGuardVersion}"
        implementation "io.github.jho951:ip-guard-spi:${ipGuardVersion}"
        implementation "io.github.jho951:rate-limiter-core:${rateLimiterVersion}"
        implementation "io.github.jho951:rate-limiter-spi:${rateLimiterVersion}"

        compileOnly "jakarta.servlet:jakarta.servlet-api:${findProperty('jakartaServletVersion') ?: '6.1.0'}"
        compileOnly "org.springframework:spring-context:${springFrameworkVersion}"
        compileOnly "org.springframework.boot:spring-boot-autoconfigure:${springBootVersion}"
        compileOnly "org.springframework.boot:spring-boot-configuration-processor:${springBootVersion}"
        annotationProcessor "org.springframework.boot:spring-boot-configuration-processor:${springBootVersion}"
    }
}

project(':platform-security-spring-boot-starter') {
    dependencies {
        api project(':platform-security-spring')
        api "org.springframework:spring-context:${springFrameworkVersion}"
        api "org.springframework.boot:spring-boot-autoconfigure:${springBootVersion}"
    }
}

project(':platform-security-common-test') {
    dependencies {
        api project(':platform-security-api')
        api project(':platform-security-core')
    }
}

project(':platform-security-auth-adapter') {
    dependencies {
        api project(':platform-security-api')
        api project(':platform-security-web')

        api "io.github.jho951:auth-core:${authVersion}"
        api "io.github.jho951:auth-jwt:${authVersion}"
        api "io.github.jho951:auth-session:${authVersion}"
        api "io.github.jho951:auth-hybrid:${authVersion}"

        compileOnly "jakarta.servlet:jakarta.servlet-api:${findProperty('jakartaServletVersion') ?: '6.1.0'}"
    }
}
