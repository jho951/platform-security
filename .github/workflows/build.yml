name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: platform-security-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-stage5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify stage-5 contract
        run: ./gradlew clean check --warning-mode all
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_READ_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
